name: Monitor LEVEL EZE-BCN

# Se ejecuta cada 10 minutos y también permite correrlo a mano (botón "Run workflow")
on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:
    inputs:
      forzar_alerta:
        description: 'Enviar alerta aunque no haya cambios (para probar)'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

# Necesario para que el job pueda guardar (commitear) el estado_level.json
permissions:
  contents: write

# Evita que se solapen dos corridas si una tarda
concurrency:
  group: monitor-level
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Instalar Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install requests

      - name: Ejecutar el monitor
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: python level_bcn_analisis.py

      - name: Guardar el estado (solo si cambió)
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add estado_level.json
          if git diff --staged --quiet; then
            echo "Estado sin cambios, no hay nada que guardar."
            exit 0
          fi
          git commit -m "Actualizar estado de precios [skip ci]"
          # Traer lo último del remoto y reintentar por si otra corrida pusheó mientras tanto
          for intento in 1 2 3 4 5; do
            if git pull --rebase --autostash origin main && git push; then
              echo "Estado guardado correctamente."
              exit 0
            fi
            echo "Push rechazado, reintento $intento..."
            sleep 5
          done
          echo "No se pudo guardar el estado tras varios reintentos."
          exit 1
